<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Smart Irrigation System</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>
    <body>
        <div class="hero">
            <h1>Smart Irrigation</h1>
            <p>ML-powered irrigation advice using real soil moisture &amp; rainfall data</p>
        </div>
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card p-4">
                        <h4 class="mb-4 fw-bold text-success">Get Your Irrigation Advice</h4>
                        <form action="/predict" method="POST">
                            <div class="mb-4">
                                <label class="form-label fw-semibold"> Your District</label>
                                <select name="district" class="form-select" required>
                                    <option value="" disabled selected>Select district...</option>
                                    {% for d in districts %}
                                        <option value="{{ d }}">{{ d.title() }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Your Crop</label>
                                <select name="crop" class="form-select" required>
                                    <option value="" disabled selected>Select crop...</option>
                                    {% for c in crops %}
                                        <option value="{{ c }}">{{ c.title() }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                Get Recommendation →
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
